# Expected ResourceSlice from a p4d.24xlarge node running DraNet.
#
# p4d.24xlarge hardware:
#   - 8x NVIDIA A100 40GB GPUs (4 per NUMA node)
#   - 4x EFA 100 Gbps interfaces (2 per NUMA node)
#   - Primary ENI (eth0) on network card 0 -- filtered out as default gateway
#
# EFA PCI devices:
#   - Vendor: 1d0f (Amazon.com, Inc.)
#   - Driver: efa
#   - RDMA devices: /sys/class/infiniband/efa_0 through efa_3
#
# This is a reference file showing what the ResourceSlice looks like.
# Actual PCI addresses, MACs, and IPs will vary per instance.
apiVersion: v1
kind: List
items:
- apiVersion: resource.k8s.io/v1
  kind: ResourceSlice
  metadata:
    generateName: ip-10-0-1-100.us-west-2.compute.internal-dra.net-
    name: ip-10-0-1-100.us-west-2.compute.internal-dra.net-abc12
    ownerReferences:
    - apiVersion: v1
      controller: true
      kind: Node
      name: ip-10-0-1-100.us-west-2.compute.internal
  spec:
    driver: dra.net
    nodeName: ip-10-0-1-100.us-west-2.compute.internal
    pool:
      name: ip-10-0-1-100.us-west-2.compute.internal
      generation: 1
      resourceSliceCount: 1
    devices:
    # ---- EFA interface 1 (Network card 1, NUMA 0) ----
    - name: pci-0000-60-00-0
      attributes:
        dra.net/ifName:
          string: "eth1"
        dra.net/pciAddress:
          string: "0000:60:00.0"
        dra.net/pciVendor:
          string: "Amazon.com, Inc."
        dra.net/pciDevice:
          string: "Elastic Fabric Adapter (EFA)"
        dra.net/pciSubsystem:
          string: "efa0"
        dra.net/mac:
          string: "0a:5b:3c:d4:e5:01"
        dra.net/mtu:
          int: 9001
        dra.net/numaNode:
          int: 0
        dra.net/encapsulation:
          string: "ether"
        dra.net/alias:
          string: ""
        dra.net/state:
          string: "up"
        dra.net/type:
          string: "device"
        dra.net/ipv4:
          string: "10.0.1.101/24"
        dra.net/rdma:
          bool: true
        dra.net/sriov:
          bool: false
        dra.net/ebpf:
          bool: false
        dra.net/virtual:
          bool: false

    # ---- EFA interface 2 (Network card 2, NUMA 0) ----
    - name: pci-0000-61-00-0
      attributes:
        dra.net/ifName:
          string: "eth2"
        dra.net/pciAddress:
          string: "0000:61:00.0"
        dra.net/pciVendor:
          string: "Amazon.com, Inc."
        dra.net/pciDevice:
          string: "Elastic Fabric Adapter (EFA)"
        dra.net/pciSubsystem:
          string: "efa0"
        dra.net/mac:
          string: "0a:5b:3c:d4:e5:02"
        dra.net/mtu:
          int: 9001
        dra.net/numaNode:
          int: 0
        dra.net/encapsulation:
          string: "ether"
        dra.net/alias:
          string: ""
        dra.net/state:
          string: "up"
        dra.net/type:
          string: "device"
        dra.net/ipv4:
          string: "10.0.1.102/24"
        dra.net/rdma:
          bool: true
        dra.net/sriov:
          bool: false
        dra.net/ebpf:
          bool: false
        dra.net/virtual:
          bool: false

    # ---- EFA interface 3 (Network card 3, NUMA 1) ----
    - name: pci-0000-a0-00-0
      attributes:
        dra.net/ifName:
          string: "eth3"
        dra.net/pciAddress:
          string: "0000:a0:00.0"
        dra.net/pciVendor:
          string: "Amazon.com, Inc."
        dra.net/pciDevice:
          string: "Elastic Fabric Adapter (EFA)"
        dra.net/pciSubsystem:
          string: "efa0"
        dra.net/mac:
          string: "0a:5b:3c:d4:e5:03"
        dra.net/mtu:
          int: 9001
        dra.net/numaNode:
          int: 1
        dra.net/encapsulation:
          string: "ether"
        dra.net/alias:
          string: ""
        dra.net/state:
          string: "up"
        dra.net/type:
          string: "device"
        dra.net/ipv4:
          string: "10.0.1.103/24"
        dra.net/rdma:
          bool: true
        dra.net/sriov:
          bool: false
        dra.net/ebpf:
          bool: false
        dra.net/virtual:
          bool: false

    # ---- EFA interface 4 (Network card 4, NUMA 1) ----
    # NOTE: p4d.24xlarge has 4 EFA-capable network cards.
    # Network card 0 (primary ENI / eth0) is filtered out as the
    # default gateway, leaving 3 EFA interfaces exposed.
    # If network card 0 also has EFA but serves as the primary,
    # only 3 devices appear here. On instances where all 4 cards
    # are secondary EFA, all 4 would appear.
