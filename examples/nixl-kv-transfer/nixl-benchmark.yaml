apiVersion: v1
kind: Service
metadata:
  name: nixl-kv-target
  labels:
    app.kubernetes.io/name: nixl-kv-transfer
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nixl-kv-transfer
    app.kubernetes.io/role: target
  ports:
  - name: nixl
    port: 5555
    targetPort: 5555
---
apiVersion: v1
kind: Pod
metadata:
  name: nixl-kv-target
  labels:
    app.kubernetes.io/name: nixl-kv-transfer
    app.kubernetes.io/role: target
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: nixl-kv-transfer
        topologyKey: kubernetes.io/hostname
  resourceClaims:
  - name: gpu-nic
    resourceClaimTemplateName: h100-4gpu-4nic-numa-aligned
  containers:
  - name: bench
    image: pytorch/pytorch:2.8.0-cuda12.8-cudnn9-runtime
    imagePullPolicy: IfNotPresent
    securityContext:
      capabilities:
        add:
        - IPC_LOCK
    env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: UCX_LOG_LEVEL
      value: warn
    - name: UCX_PROTO_INFO
      value: "y"
    resources:
      claims:
      - name: gpu-nic
      requests:
        cpu: "8"
        memory: 64Gi
    volumeMounts:
    - name: bench-script
      mountPath: /bench
    - name: shm
      mountPath: /dev/shm
    command:
    - /bin/bash
    - -lc
    - |
      set -euo pipefail
      python -m pip install --no-cache-dir nixl
      NIXL_LIB_PATH=$(python - <<'PY'
      import importlib.util
      import pathlib

      dirs = []
      for mod_name in ("nixl_cu12", "nixl_cu13"):
          spec = importlib.util.find_spec(mod_name)
          if spec is None or spec.origin is None:
              continue
          package_dir = pathlib.Path(spec.origin).resolve().parent
          for candidate in (
              package_dir.parent / f"{mod_name}.libs",
              package_dir.parent / f".{mod_name}.mesonpy.libs",
              package_dir.parent / f".{mod_name}.mesonpy.libs" / "plugins",
          ):
              if candidate.exists():
                  dirs.append(str(candidate))
      print(":".join(dirs))
      PY
      )
      export LD_LIBRARY_PATH="${NIXL_LIB_PATH}:${LD_LIBRARY_PATH:-}"
      nvidia-smi topo -m || true
      ibv_devices || true
      timeout 900s python /bench/nixl_microbench.py \
        --mode target \
        --port 5555 \
        --backend UCX \
        --op WRITE \
        --block-size 1073741824 \
        --batch-size 1 \
        --iters 100 \
        --warmup-iters 20
  volumes:
  - name: bench-script
    configMap:
      name: nixl-microbench
      defaultMode: 0755
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 64Gi
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
---
