# Hits the P/D router with realistic chat-style traffic and prints a
# TTFT / TPOT / ITL / throughput summary.
#
# Re-apply once per ResourceClaimTemplate (`pd-4gpu-aligned`, `pd-4gpu-unaligned`)
# and compare. Long input + short output makes per-request KV transfer the
# dominant TTFT contributor, which is what NIC bandwidth and NIC<->GPU NUMA
# placement actually drive.
apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-bench
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      # Pin to a GPU node only because that's where the model-warmer DaemonSet
      # has the local snapshot. The bench itself doesn't need a GPU.
      nodeSelector: { nvidia.com/gpu.present: "true" }
      tolerations: [{ key: nvidia.com/gpu, effect: NoSchedule, operator: Exists }]
      containers:
      - name: bench
        image: vllm/vllm-openai:gemma4
        env:
        - { name: MODEL, value: meta-llama/Llama-3.1-70B-Instruct }
        - { name: HF_TOKEN, valueFrom: { secretKeyRef: { name: hf-token, key: token } } }
        command: ["/bin/bash", "-euxo", "pipefail", "-c"]
        args:
        - |
          until curl -sf http://vllm-router:8000/v1/models > /dev/null; do
            echo "waiting for router..."; sleep 10
          done

          # 28 k-token prompt drives the prefill -> decode KV transfer hard;
          # 256 output tokens keeps the decode-phase work bounded. Stays under
          # vllm's --max-model-len 32768 with margin for chat-template tokens.
          # Long input is what makes NIC bandwidth visible in TTFT.
          vllm bench serve \
            --backend openai \
            --base-url http://vllm-router:8000 \
            --endpoint /v1/completions \
            --model "${MODEL}" \
            --tokenizer "/models/${MODEL}" \
            --dataset-name random \
            --random-input-len 28672 \
            --random-output-len 256 \
            --num-prompts 200 \
            --max-concurrency 16 \
            --percentile-metrics ttft,tpot,itl,e2el \
            --metric-percentiles 50,90,99 \
            --save-result --result-dir /results

          echo "==== summary ===="
          ls /results
          cat /results/*.json | python3 -c '
          import json,sys
          d=json.load(sys.stdin)
          for k in ("mean_ttft_ms","median_ttft_ms","p99_ttft_ms",
                    "mean_tpot_ms","median_tpot_ms","p99_tpot_ms",
                    "mean_itl_ms","median_itl_ms","p99_itl_ms",
                    "request_throughput","output_throughput"):
              if k in d: print(f"{k}: {d[k]:.2f}")
          '
        volumeMounts:
        - { name: results,     mountPath: /results }
        - { name: model-cache, mountPath: /models, readOnly: true }
      volumes:
      - { name: results, emptyDir: {} }
      - { name: model-cache, hostPath: { path: /var/lib/models, type: Directory } }
