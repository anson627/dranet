# Two ResourceClaimTemplates that isolate the GPU<->NIC NUMA-alignment
# effect at fixed compute and fixed bandwidth.
#
# Both claim 4 GPUs + 4 NICs. The 4 NICs are always on NUMA 0. The
# difference is which NUMA the 4 GPUs sit on:
#
#   pd-4gpu-aligned    : 4 GPUs on NUMA 0  -> every GPU has a same-NUMA NIC
#   pd-4gpu-unaligned  : 4 GPUs on NUMA 1  -> every GPU must reach a NIC on
#                                             the other NUMA, every rail is
#                                             cross-socket DMA
#
# Topology assumed (Azure ND H100 v5):
#   - GPUs:  pciBusID 0001/0002/0003/0008:00:00.0 on NUMA 0,
#            pciBusID 0009/000a/000b/000c:00:00.0 on NUMA 1.
#   - NICs:  4 RDMA NICs per NUMA node (8 total), exposed by dranet.
#
# Why pin GPUs by pciBusID (not numaNode)? The NVIDIA k8s-dra-driver-gpu
# does not publish a numaNode attribute, and on Azure ND H100 v5 it cannot
# publish pcieRoot either (each GPU is behind a Hyper-V VMBus path that the
# resolver rejects). Until the GPU driver publishes a standard numaNode
# attribute, NUMA-aware GPU selection has to go through pciBusID.
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: pd-4gpu-aligned
spec:
  spec:
    devices:
      requests:
      - name: gpus
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 4
          selectors:
          - cel:
              # EDIT: pciBusIDs of 4 GPUs on NUMA 0 on your node.
              expression: 'device.attributes["resource.kubernetes.io"]["pciBusID"] in ["0001:00:00.0","0002:00:00.0","0003:00:00.0","0008:00:00.0"]'
      - name: nics
        exactly:
          deviceClassName: dra.net
          count: 4
          selectors:
          - cel:
              expression: 'device.attributes["dra.net"]["rdma"] == true && device.attributes["dra.net"]["numaNode"] == 0'
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: pd-4gpu-unaligned
spec:
  spec:
    devices:
      requests:
      - name: gpus
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 4
          selectors:
          - cel:
              # EDIT: pciBusIDs of 4 GPUs on NUMA 1 on your node.
              expression: 'device.attributes["resource.kubernetes.io"]["pciBusID"] in ["0009:00:00.0","000a:00:00.0","000b:00:00.0","000c:00:00.0"]'
      - name: nics
        exactly:
          deviceClassName: dra.net
          count: 4
          selectors:
          - cel:
              expression: 'device.attributes["dra.net"]["rdma"] == true && device.attributes["dra.net"]["numaNode"] == 0'
