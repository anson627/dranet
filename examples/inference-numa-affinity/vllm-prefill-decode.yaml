# Disaggregated prefill/decode serving of google/gemma-4-31B-it
# across two GPU nodes connected by an RDMA fabric.
#
#   vllm-prefill (node A):  8 GPUs (TP=8), holds full BF16 copy of weights,
#                           handles prompt prefill, exports KV blocks via NIXL.
#   vllm-decode  (node B):  8 GPUs (TP=8), holds full BF16 copy of weights,
#                           imports KV blocks from prefill, generates tokens.
#   vllm-router  (CPU):     OpenAI-compatible front door. Forwards each
#                           request first to prefill (max_tokens=1) to populate
#                           the KV cache, then streams the decode response.
#
# Each vLLM pod claims one ResourceClaim. Edit `resourceClaimTemplateName` on
# BOTH pods to switch test case (`pd-aligned` vs `pd-half-bandwidth`).
#
# 31B at TP=8 leaves the per-GPU weight footprint tiny (~8 GB) -- intentional.
# We use TP=8 so the per-rank KV slice is sent over a dedicated NIC, exercising
# all 8 RDMA rails and exposing the NIC-NUMA placement signal in TTFT. Long
# prompts (--max-model-len 32768) make the prefill->decode KV transfer big
# enough to dominate TTFT.
#
# Prereqs:
#   - Secret `hf-token` with key `token`. google/gemma-4-31B-it is Apache 2.0
#     but HF still requires you to accept Google's usage notice once on the
#     model page (instant approval, no waiting list).
#   - Two GPU nodes labeled identically; the pods land on different nodes via
#     podAntiAffinity on the shared `app: vllm-pd` label.
#
# Model caching: the `model-warmer` DaemonSet (defined first in this file)
# downloads the model into hostPath /var/lib/models/google/gemma-4-31B-it on
# each GPU node exactly once. The vllm-prefill / vllm-decode pods mount that
# hostPath and wait on a `.ready` sentinel before starting `vllm serve`, so
# pod restarts boot in seconds instead of redownloading 62 GB.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-warmer
spec:
  selector:
    matchLabels: { app: model-warmer }
  template:
    metadata:
      labels: { app: model-warmer }
    spec:
      # Only run on GPU nodes. Adjust the selector to match your cluster
      # (e.g. agentpool=gpu on AKS, gpu=true on GKE).
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - { key: nvidia.com/gpu, effect: NoSchedule, operator: Exists }
      initContainers:
      - name: hf-fetch
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eux
          DEST="/models/${MODEL}"
          if [ -f "${DEST}/.ready" ]; then
            echo "model already cached at ${DEST}"; exit 0
          fi
          mkdir -p "${DEST}"
          pip install --no-cache-dir 'huggingface_hub' >/dev/null
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download
          snapshot_download(
              os.environ["MODEL"],
              local_dir="/models/" + os.environ["MODEL"],
              max_workers=4,
          )
          PY
          touch "${DEST}/.ready"
        env:
        - { name: MODEL, value: google/gemma-4-31B-it }
        - { name: HF_TOKEN, valueFrom: { secretKeyRef: { name: hf-token, key: token } } }
        - { name: HF_HUB_DOWNLOAD_TIMEOUT, value: "300" }
        # The Xet chunked-storage endpoint (xet-read-token) intermittently
        # 500s for Gemma 4 weights. Disable to use the legacy CDN path.
        - { name: HF_HUB_DISABLE_XET, value: "1" }
        volumeMounts:
        - { name: models, mountPath: /models }
      containers:
      # Idle pad once the download is complete so the DS pod stays Ready and
      # the model files keep their hostPath bind-mount available to vllm pods.
      - name: pause
        image: registry.k8s.io/pause:3.9
      volumes:
      - name: models
        hostPath: { path: /var/lib/models, type: DirectoryOrCreate }
---
apiVersion: v1
kind: Service
metadata: { name: vllm-prefill }
spec:
  selector: { app: vllm-pd, role: prefill }
  clusterIP: None                   # headless; router needs the pod IP for NIXL
  ports:
  - { name: http, port: 8100, targetPort: 8100 }
  - { name: nixl, port: 5557, targetPort: 5557 }
---
apiVersion: v1
kind: Service
metadata: { name: vllm-decode }
spec:
  selector: { app: vllm-pd, role: decode }
  clusterIP: None
  ports:
  - { name: http, port: 8200, targetPort: 8200 }
  - { name: nixl, port: 5557, targetPort: 5557 }
---
apiVersion: v1
kind: Service
metadata: { name: vllm-router }
spec:
  selector: { app: vllm-pd, role: router }
  ports:
  - { name: http, port: 8000, targetPort: 8000 }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: vllm-pd-scripts }
data:
  prefill.sh: |
    #!/bin/bash
    set -euxo pipefail
    export VLLM_NIXL_SIDE_CHANNEL_HOST="${POD_IP}"
    export VLLM_NIXL_SIDE_CHANNEL_PORT=5557
    export UCX_TLS="${UCX_TLS:-^posix}"
    export UCX_NET_DEVICES="${UCX_NET_DEVICES:-all}"
    # Serve from the snapshot pre-fetched by the init container. Passing a
    # local path makes transformers' `is_local=True` short-circuit the
    # `_patch_mistral_regex` -> HF `model_info()` call (which 500s under load
    # and crashes a TP worker). --served-model-name keeps the OpenAI-API
    # advertised model id stable for the benchmark client.
    exec vllm serve "/models/${MODEL}" \
      --served-model-name "${MODEL}" \
      --tensor-parallel-size 8 \
      --gpu-memory-utilization 0.90 \
      --max-model-len 32768 \
      --port 8100 \
      --host 0.0.0.0 \
      --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}'
  decode.sh: |
    #!/bin/bash
    set -euxo pipefail
    export VLLM_NIXL_SIDE_CHANNEL_HOST="${POD_IP}"
    export VLLM_NIXL_SIDE_CHANNEL_PORT=5557
    export UCX_TLS="${UCX_TLS:-^posix}"
    export UCX_NET_DEVICES="${UCX_NET_DEVICES:-all}"
    # Serve from the snapshot pre-fetched by the init container. Passing a
    # local path makes transformers' `is_local=True` short-circuit the
    # `_patch_mistral_regex` -> HF `model_info()` call (which 500s under load
    # and crashes a TP worker). --served-model-name keeps the OpenAI-API
    # advertised model id stable for the benchmark client.
    exec vllm serve "/models/${MODEL}" \
      --served-model-name "${MODEL}" \
      --tensor-parallel-size 8 \
      --gpu-memory-utilization 0.90 \
      --max-model-len 32768 \
      --port 8200 \
      --host 0.0.0.0 \
      --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}'
  router.sh: |
    #!/bin/bash
    set -euxo pipefail
    pip install --no-cache-dir 'fastapi' 'uvicorn[standard]' 'httpx>=0.27' >/dev/null
    until getent hosts vllm-prefill > /dev/null && getent hosts vllm-decode > /dev/null; do
      echo "waiting for prefill/decode service DNS..."; sleep 3
    done
    # The python:slim image has no curl, so probe via urllib instead.
    probe() { python -c "import sys,urllib.request as u; u.urlopen(sys.argv[1], timeout=5)" "$1"; }
    until probe http://vllm-prefill:8100/v1/models 2>/dev/null; do
      echo "waiting for prefill /v1/models..."; sleep 15
    done
    until probe http://vllm-decode:8200/v1/models 2>/dev/null; do
      echo "waiting for decode /v1/models..."; sleep 15
    done
    exec python /scripts/proxy.py \
      --host 0.0.0.0 --port 8000 \
      --prefiller-host vllm-prefill --prefiller-port 8100 \
      --decoder-host  vllm-decode  --decoder-port  8200
  proxy.py: |
    # Minimal P/D proxy adapted from vLLM's tests/v1/kv_connector/nixl_integration/toy_proxy_server.py
    # Forwards the request to prefill with max_tokens=1, lifts the returned
    # kv_transfer_params, then streams the decode response back to the client.
    import argparse, itertools, logging, os, uuid
    from contextlib import asynccontextmanager
    import httpx
    from fastapi import FastAPI, Request
    from fastapi.responses import StreamingResponse

    logger = logging.getLogger("pd-proxy")
    logger.setLevel(logging.INFO)

    @asynccontextmanager
    async def lifespan(app: FastAPI):
        app.state.prefill = [{"client": httpx.AsyncClient(timeout=None,
            base_url=f"http://{h}:{p}/v1",
            limits=httpx.Limits(max_connections=None, max_keepalive_connections=None)),
            "host": h, "port": p}
            for h, p in zip(args.prefiller_hosts, args.prefiller_ports)]
        app.state.decode  = [{"client": httpx.AsyncClient(timeout=None,
            base_url=f"http://{h}:{p}/v1",
            limits=httpx.Limits(max_connections=None, max_keepalive_connections=None)),
            "host": h, "port": p}
            for h, p in zip(args.decoder_hosts, args.decoder_ports)]
        app.state.pi = itertools.cycle(range(len(app.state.prefill)))
        app.state.di = itertools.cycle(range(len(app.state.decode)))
        yield
        for c in app.state.prefill + app.state.decode:
            await c["client"].aclose()

    app = FastAPI(lifespan=lifespan)

    async def _prefill(client, endpoint, req, rid):
        # Build a prefill-only variant of the request: max_tokens=1, no
        # streaming, drop min_tokens/min_completion_tokens (P doesn't accept
        # them when paired with kv_transfer). Leaves the original `req` dict
        # untouched so the caller can forward the unmodified request to D.
        d = dict(req)
        d["kv_transfer_params"] = {
            "do_remote_decode": True, "do_remote_prefill": False,
            "remote_engine_id": None, "remote_block_ids": None,
            "remote_host": None, "remote_port": None,
        }
        d["stream"] = False
        d["max_tokens"] = 1
        if "max_completion_tokens" in d: d["max_completion_tokens"] = 1
        d.pop("stream_options", None)
        d.pop("min_tokens", None)
        d.pop("min_completion_tokens", None)
        r = await client["client"].post(endpoint, json=d, headers={"X-Request-Id": rid})
        r.raise_for_status()
        await r.aread()
        return r

    async def _stream(client, endpoint, req, rid):
        headers = {"X-Request-Id": rid}
        async with client["client"].stream("POST", endpoint, json=req, headers=headers) as r:
            r.raise_for_status()
            async for chunk in r.aiter_bytes():
                yield chunk

    async def _handle(api, request):
        body = await request.json()
        rid  = str(uuid.uuid4())
        p = app.state.prefill[next(app.state.pi)]
        d = app.state.decode [next(app.state.di)]
        pre = await _prefill(p, api, body, rid)
        kv = pre.json().get("kv_transfer_params", {})
        await pre.aclose()
        # Forward the *original* request to decode (full max_tokens, original
        # streaming flag, etc.), only injecting the KV handle from prefill.
        if kv: body["kv_transfer_params"] = kv
        return StreamingResponse(_stream(d, api, body, rid), media_type="application/json")

    @app.post("/v1/completions")
    async def comp(request: Request): return await _handle("/completions", request)
    @app.post("/v1/chat/completions")
    async def chat(request: Request): return await _handle("/chat/completions", request)
    @app.get("/v1/models")
    async def models():
        # Pass through to the prefill backend so clients can discover the model id.
        c = app.state.prefill[0]["client"]
        r = await c.get("/models")
        return r.json()

    if __name__ == "__main__":
        ap = argparse.ArgumentParser()
        ap.add_argument("--host", default="0.0.0.0")
        ap.add_argument("--port", type=int, default=8000)
        ap.add_argument("--prefiller-hosts", nargs="+", default=["vllm-prefill"])
        ap.add_argument("--prefiller-ports", nargs="+", type=int, default=[8100])
        ap.add_argument("--decoder-hosts",   nargs="+", default=["vllm-decode"])
        ap.add_argument("--decoder-ports",   nargs="+", type=int, default=[8200])
        args = ap.parse_args()
        import uvicorn
        uvicorn.run(app, host=args.host, port=args.port)
---
# ---------------- Prefill pod (8 GPUs + N NICs on node A) ----------------
apiVersion: v1
kind: Pod
metadata:
  name: vllm-prefill
  labels: { app: vllm-pd, role: prefill }
spec:
  restartPolicy: Never
  resourceClaims:
  - name: devices
    resourceClaimTemplateName: pd-aligned   # EDIT to switch test case
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector: { matchLabels: { app: vllm-pd } }
        topologyKey: kubernetes.io/hostname
  initContainers:
  # Block on the per-node DaemonSet finishing the model download. The DS
  # writes /models/<MODEL>/.ready when snapshot_download() completes.
  - name: wait-for-model
    image: busybox:1.36
    command: ["/bin/sh","-c"]
    args:
    - |
      until [ -f /models/google/gemma-4-31B-it/.ready ]; do
        echo "waiting for model-warmer DaemonSet to finish on this node..."
        sleep 15
      done
      echo "model is cached on this node"
    volumeMounts:
    - { name: model-cache, mountPath: /models, readOnly: true }
  containers:
  - name: vllm
    image: vllm/vllm-openai:gemma4
    command: ["/bin/bash", "/scripts/prefill.sh"]
    env:
    - { name: MODEL,    value: google/gemma-4-31B-it }
    # No HF_TOKEN here — weights are already on disk via the model-warmer DS.
    - { name: NCCL_IB_HCA,         value: "mlx5" }
    - { name: NCCL_IB_DATA_DIRECT, value: "0" }
    - { name: NCCL_DEBUG,          value: INFO }
    - { name: POD_IP, valueFrom: { fieldRef: { fieldPath: status.podIP } } }
    - { name: VLLM_HOST_IP, valueFrom: { fieldRef: { fieldPath: status.podIP } } }
    ports:
    - { name: http, containerPort: 8100 }
    - { name: nixl, containerPort: 5557 }
    resources:
      claims:
      - name: devices
      limits: { nvidia.com/gpu: "0" }   # GPUs come from DRA, not the device plugin
    volumeMounts:
    - { name: scripts,  mountPath: /scripts }
    - { name: model-cache, mountPath: /models, readOnly: true }
    - { name: shm,      mountPath: /dev/shm }
    securityContext:
      capabilities: { add: ["IPC_LOCK"] }
  volumes:
  - { name: scripts,  configMap: { name: vllm-pd-scripts, defaultMode: 0755 } }
  - { name: model-cache, hostPath: { path: /var/lib/models, type: DirectoryOrCreate } }
  - { name: shm,      emptyDir: { medium: Memory, sizeLimit: 64Gi } }
---
# ---------------- Decode pod (8 GPUs + N NICs on node B) -----------------
apiVersion: v1
kind: Pod
metadata:
  name: vllm-decode
  labels: { app: vllm-pd, role: decode }
spec:
  restartPolicy: Never
  resourceClaims:
  - name: devices
    resourceClaimTemplateName: pd-aligned   # EDIT to switch test case
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector: { matchLabels: { app: vllm-pd } }
        topologyKey: kubernetes.io/hostname
  initContainers:
  # Block on the per-node DaemonSet finishing the model download. The DS
  # writes /models/<MODEL>/.ready when snapshot_download() completes.
  - name: wait-for-model
    image: busybox:1.36
    command: ["/bin/sh","-c"]
    args:
    - |
      until [ -f /models/google/gemma-4-31B-it/.ready ]; do
        echo "waiting for model-warmer DaemonSet to finish on this node..."
        sleep 15
      done
      echo "model is cached on this node"
    volumeMounts:
    - { name: model-cache, mountPath: /models, readOnly: true }
  containers:
  - name: vllm
    image: vllm/vllm-openai:gemma4
    command: ["/bin/bash", "/scripts/decode.sh"]
    env:
    - { name: MODEL,    value: google/gemma-4-31B-it }
    # No HF_TOKEN here — weights are already on disk via the model-warmer DS.
    - { name: NCCL_IB_HCA,         value: "mlx5" }
    - { name: NCCL_IB_DATA_DIRECT, value: "0" }
    - { name: NCCL_DEBUG,          value: INFO }
    - { name: POD_IP, valueFrom: { fieldRef: { fieldPath: status.podIP } } }
    - { name: VLLM_HOST_IP, valueFrom: { fieldRef: { fieldPath: status.podIP } } }
    ports:
    - { name: http, containerPort: 8200 }
    - { name: nixl, containerPort: 5557 }
    resources:
      claims:
      - name: devices
      limits: { nvidia.com/gpu: "0" }
    volumeMounts:
    - { name: scripts,  mountPath: /scripts }
    - { name: model-cache, mountPath: /models, readOnly: true }
    - { name: shm,      mountPath: /dev/shm }
    securityContext:
      capabilities: { add: ["IPC_LOCK"] }
  volumes:
  - { name: scripts,  configMap: { name: vllm-pd-scripts, defaultMode: 0755 } }
  - { name: model-cache, hostPath: { path: /var/lib/models, type: DirectoryOrCreate } }
  - { name: shm,      emptyDir: { medium: Memory, sizeLimit: 64Gi } }
---
# ---------------- Router pod (CPU only) ----------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: vllm-router
  labels: { app: vllm-pd, role: router }
spec:
  restartPolicy: Never
  containers:
  - name: router
    image: python:3.11-slim
    command: ["/bin/bash", "/scripts/router.sh"]
    ports:
    - { name: http, containerPort: 8000 }
    volumeMounts:
    - { name: scripts, mountPath: /scripts }
  volumes:
  - { name: scripts, configMap: { name: vllm-pd-scripts, defaultMode: 0755 } }
